name: Deploy Portfolio to S3 + CloudFront

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to S3 & Invalidate CloudFront
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configure AWS credentials from GitHub Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Sync files to S3 (exclude .git, .github, README)
      - name: Deploy to S3
        run: |
          aws s3 sync . s3://jeni-portfolio \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md" \
            --exclude "*.jpeg" \
            --exclude "*.jpg" \
            --delete
          echo "✅ S3 sync complete → s3://jeni-portfolio"

      # 4. Invalidate CloudFront cache so changes go live immediately
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "✅ CloudFront cache invalidated → https://d3n8nd35qm5vvz.cloudfront.net"

      # 5. Print live URL in the Actions log
      - name: Deployment Summary
        run: |
          echo "🚀 Portfolio deployed successfully!"
          echo "🌐 Live URL: https://d3n8nd35qm5vvz.cloudfront.net"
