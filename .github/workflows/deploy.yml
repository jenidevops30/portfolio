name: Deploy Portfolio to S3 + CloudFront

on:
  push:
    branches:
      - v2

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install dependencies and build
      - name: Install & Build
        run: |
          npm ci
          npm run build

      # 4. Configure AWS credentials from GitHub Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 5. Sync build output (dist/) to S3
      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://jeni-portfolio --delete
          echo "✅ S3 sync complete → s3://jeni-portfolio"

      # 6. Invalidate CloudFront cache
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "✅ CloudFront cache invalidated"

      # 7. Print live URL
      - name: Deployment Summary
        run: |
          echo "🚀 Portfolio deployed successfully!"
          echo "🌐 Live URL: https://d3n8nd35qm5vvz.cloudfront.net"
